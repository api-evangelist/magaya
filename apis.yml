aid: magaya
url: https://raw.githubusercontent.com/api-evangelist/magaya/refs/heads/main/apis.yml
name: Magaya
kind: company
description: Magaya is a logistics and supply chain software company whose cloud
  Digital Freight Platform runs freight forwarding, warehouse management, customs
  compliance, rate management, and a digital customer experience portal. Magaya
  exposes programmatic access to the logistics objects inside a customer's system -
  Shipments, Warehouse Receipts, Invoices, Items, and financial Transactions -
  through the Magaya API (a SOAP/XML Web Service) and the newer Magaya Open API
  collection of web services, plus a REST Digital Freight Portal API inherited from
  the Qwyk acquisition. API access is gated behind a Magaya subscription and a
  dedicated API user configured in the customer's own tenant (base URL of the form
  https://SYSTEMID.magayacloud.com/api); the reference documentation is public but
  runtime access requires a licensed system, so the resource paths below are
  honestly modeled from Magaya's published object model rather than confirmed
  against an open self-serve reference.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
- Logistics
- Supply Chain
- Freight Forwarding
- Warehouse Management
- Shipping
- Customs
- Transportation
