  - url: openapi/magaya-openapi.yml
    type: OpenAPI
  - url: collections/magaya.postman_collection.json
    type: PostmanCollection
  - url: collections/magaya.opencollection.json
    type: OpenCollection
  description: Access warehouse receipts and the cargo pieces, weights, volumes, and
    inventory balances they record as goods are received into a Magaya-managed
