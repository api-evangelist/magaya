  description: Programmatic access to air, ocean, and ground shipments in a Magaya
    system - list, retrieve, and create shipment records with their consignee,
    shipper, routing, cargo, and milestone/tracking event data. Endpoint paths are
    modeled from Magaya's published Open API object model; the runtime API is
    reached at a per-tenant magayacloud.com base and requires a configured API user.
