    type: OpenAPI
  - url: collections/magaya.postman_collection.json
    type: PostmanCollection
  - url: collections/magaya.opencollection.json
    type: OpenCollection
  description: Generic access to Magaya transaction documents - pickup orders,
    bookings, quotations, sales orders, purchase orders, cargo releases, and other
    dated transaction records - that share Magaya's common transaction envelope.
    Endpoints are modeled from Magaya's published transaction object model and flagged
    as unconfirmed against an open self-serve reference.
