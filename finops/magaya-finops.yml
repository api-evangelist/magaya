description: >-
  FinOps view of Magaya spend. Magaya is licensed as a commercial SaaS
  subscription to the Digital Freight Platform, priced by quote rather than by
  API usage. There is no metered, pay-per-call API billing - the API is an
  included capability of the platform subscription. The dominant cost drivers
  are the subscription itself (modules licensed, number of users/seats, and
  system size) and, for on-premises deployments, the customer's own
  infrastructure. Integration effort (building and maintaining connectors to the
  SOAP/XML Web Service, Open API, and Digital Freight Portal REST API) is an
  internal engineering cost rather than a Magaya invoice line.
notes: >-
  Per-unit or per-call API rates do not exist; Magaya does not bill the API as a
  metered service. Verify subscription terms and any overage/professional-services
  fees with Magaya sales during reconciliation.
