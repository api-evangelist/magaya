meters:
- name: platform_subscription
  description: Recurring subscription to the Magaya Digital Freight Platform and licensed modules; the API is included, not metered.
  unit: months
  aggregation: sum
  dimensions:
  - account
  - module
- name: users
  description: Licensed users/seats on the Magaya system, a primary pricing dimension.
  unit: users
  aggregation: max
  dimensions:
  - account
- name: integration_engineering
  description: Internal cost of building and maintaining connectors to the Magaya API, Open API, and Digital Freight Portal REST API.
  unit: hours
  aggregation: sum
  dimensions:
  - team
- name: onprem_infrastructure
  description: Infrastructure cost of running an on-premises Magaya deployment, where applicable (no Magaya invoice).
  unit: hours
  aggregation: sum
  dimensions:
  - deployment
principles:
- name: Visibility
  description: Track the Magaya subscription, licensed modules, and seat count as fixed recurring cost; the API itself is not separately metered.
- name: Allocation
  description: Attribute the platform subscription and integration engineering effort to the logistics workflows and teams that depend on Magaya data.
- name: Optimization
  description: License only the modules in use, right-size seats, and prefer incremental (updatedSince) synchronization to keep integration compute low.
- name: Accountability
  description: Assign an owner for the Magaya subscription and for each integration; review module usage and seat counts against the contract periodically.
